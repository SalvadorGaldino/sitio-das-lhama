<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finalizar Reserva - Sítio das Lhamas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- topbar -->
    <section class="topbar bg-dark py-2 border-bottom border-dark">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <p class="mb-0 text-white">
                    Entre em contato para reservas: <a href="tel:+5548991262230" class="text-white text-decoration-none">+55 48 9 9126-2230</a>
                </p>
                <p class="mb-0">
                    <a href="#" class="text-decoration-none text-white">Anitápolis, SC</a>
                </p>
            </div>
        </div>
    </section>

    <!-- header -->
    <section class="header">
        <nav class="navbar navbar-expand-lg bg-transparent">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="img/logo.jpg" class="img-fluid logo" alt="Sítio das Lhamas">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Alternar navegação">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item ms-4"><a class="nav-link text-dark" href="index.html">Início</a></li>
                        <li class="nav-item ms-4"><a class="nav-link text-dark" href="about.html">Sobre Nós</a></li>
                        <li class="nav-item ms-4"><a class="nav-link text-dark" href="rooms.html">Acomodações</a></li>
                        <li class="nav-item ms-4"><a class="nav-link text-dark active" href="reservation.html">Reservas</a></li>
                        <li class="nav-item ms-4"><a class="nav-link text-dark" href="contact.html">Contato</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </section>

    <!-- finalizar reserva -->
    <section class="checkout py-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6 p-4">
                    <div class="card border-0">
                        <img src="img/hotel-2.jpg" class="card-img-top" alt="Imagem da Acomodação">
                        <div class="card-body px-0">
                            <h2 class="card-title ls-3">Casa Deluxe</h2>
                            <p class="card-text mb-0">Máximo de Hóspedes: 2</p>
                            <p class="card-text mb-0">Tamanho: 400 m²</p>
                            <p class="card-text mb-0">Diária: R$ 200,00</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 p-4">
                    <form action="confirm.html">
                        <div class="mb-3">
                            <label for="name" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="name">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">Endereço</label>
                            <textarea class="form-control" id="address"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="checkin" class="form-label">Data de Check-in</label>
                                    <input type="date" class="form-control" id="checkin">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="checkout" class="form-label">Data de Check-out</label>
                                    <input type="date" class="form-control" id="checkout">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="cardnumber" class="form-label">Número do Cartão</label>
                                    <input type="text" class="form-control" id="cardnumber">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label for="expiration" class="form-label">Validade</label>
                                    <input type="text" class="form-control" id="expiration">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label for="cvv" class="form-label">CVV</label>
                                    <input type="text" class="form-control" id="cvv">
                                </div>
                            </div>
                        </div>
                        <div class="text-end">
                            <button type="submit" class="btn btn-orange mt-4">Confirmar Reserva</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- footer -->
    <footer class="bg-dark text-center text-white">
        <div class="container p-4 pb-0">
            <section class="mb-4">
                
                <a class="btn btn-outline-light btn-floating m-1" href="#!" role="button"><i class="fab fa-instagram"></i></a>
                <a class="btn btn-outline-light btn-floating m-1" href="#!" role="button"><i class="fab fa-whatsapp"></i></a>
            </section>
        </div>
        <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.2);">
            © 2025 Todos os direitos reservados:
            <a class="text-white" href="index.html">Sítio das Lhamas</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
